<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gsterz Dashboard V0.2</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background:#edf2f7;
        }

        .card{
            background:white;
            border-radius:14px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #d1d5db;
            padding:8px;
            text-align:center;
        }

        th{
            background:#f3f4f6;
            font-weight:700;
        }

        .title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .number{
            font-size:24px;
            font-weight:bold;
        }

        .petOn{
            color:#16a34a;
            font-weight:bold;
        }

        .petOff{
            color:#dc2626;
            font-weight:bold;
        }

        .petReady{
            color:#ca8a04;
            font-weight:bold;
        }

        .attend{
            color:#16a34a;
            font-weight:bold;
            font-size:18px;
        }

        .absent{
            color:#dc2626;
            font-weight:bold;
            font-size:18px;
        }

    </style>

</head>

<body class="p-5">

<div class="max-w-[1850px] mx-auto">

<!-- ================= HEADER ================= -->

<div class="card p-5 mb-5">

<div class="flex justify-between items-center">

<div>

<div class="text-3xl font-bold">

Gangster Board

</div>

</div>

<div class="flex items-center gap-8">

<div class="text-center">

<div class="text-sm text-gray-500">

UTC

</div>

<div id="utcClock"

class="text-4xl font-bold tracking-widest">

00:00:00

</div>

</div>

<button id="startButton"

class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold">

START

</button>

<button id="stopButton"

class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-bold">

STOP

</button>

</div>

</div>

</div>

<!-- ================= MAIN ================= -->

<div class="grid grid-cols-12 gap-5">

<!-- LEFT -->

<div class="col-span-4 space-y-5">

<!-- SERVER SUMMARY -->

<div class="card p-5">

<div class="title">

◎ 서버현황

</div>

<table>

<thead>

<tr>

<th>서버</th>

<th id="state1Header"></th>

<th id="state2Header"></th>

</tr>

</thead>

<tbody id="serverSummaryBody">

<!-- JS 생성 -->

</tbody>

</table>

</div>

<!-- 1690 -->

<div class="card p-5">

<div id="state1Title"

class="title">

</div>

<table>

<thead>

<tr>

<th>연맹</th>

<th>집결장</th>

<th>펫ON</th>

<th>펫OFF</th>

<th>잔여</th>

</tr>

</thead>

<tbody id="alliance1Body">

</tbody>

</table>

</div>

<!-- 상대맹 -->

<div class="card p-5">

<div id="state2Title"

class="title">

</div>

<table>

<thead>

<tr>

<th>연맹</th>

<th>집결장</th>

<th>펫ON</th>

<th>펫OFF</th>

<th>잔여</th>

</tr>

</thead>

<tbody id="alliance2Body">

</tbody>

</table>

</div>

</div>

<!-- ================= RIGHT ================= -->

<div class="col-span-8">

    <div class="card p-5">

        <div class="flex justify-between items-center mb-4">

            <div class="title mb-0">
                ◎ 인원 현황
            </div>

            <div class="text-sm text-gray-500">
                Total :
                <span id="memberCount" class="font-bold text-black">
                    0
                </span>
            </div>

        </div>

        <div class="overflow-y-auto max-h-[900px]">

            <!-- ================= STATE 1 ================= -->

            <div id="memberState1Title"
                class="text-xl font-bold mb-3">
            </div>

            <table class="mb-8">

                <thead>

                    <tr>

                        <th style="width:80px;">연맹</th>

                        <th>아이디</th>

                        <th style="width:90px;">펫상태</th>

                        <th style="width:110px;">잔여시간</th>

                        <th style="width:70px;">행성</th>

                        <th style="width:70px;">지심</th>

                        <th style="width:90px;">펫투</th>

                        <th style="width:70px;">참여</th>

                        <th>참고사항</th>

                    </tr>

                </thead>

                <tbody id="memberTable1Body">

                </tbody>

            </table>

            <!-- ================= STATE 2 ================= -->

            <div id="memberState2Title"
                class="text-xl font-bold mb-3 mt-6">
            </div>

            <table>

                <thead>

                    <tr>

                        <th style="width:80px;">연맹</th>

                        <th>아이디</th>

                        <th style="width:90px;">펫상태</th>

                        <th style="width:110px;">잔여시간</th>

                        <th style="width:70px;">행성</th>

                        <th style="width:70px;">지심</th>

                        <th style="width:90px;">펫투</th>

                        <th style="width:70px;">참여</th>

                        <th>참고사항</th>

                    </tr>

                </thead>

                <tbody id="memberTable2Body">

                </tbody>

            </table>

        </div>

    </div>

</div>

</div>

<script src="script.js">
    
</script>

</body>

</html>
